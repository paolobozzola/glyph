# XcodeGen spec — generates Glyph.xcodeproj.
#   brew install xcodegen   then   make   (see docs/SETUP.md)
name: Glyph
options:
  bundleIdPrefix: com.paolobozzola
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"          # Swift 5 language mode; move to 6 later
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    # Local dev signing (free Apple Development cert).
    DEVELOPMENT_TEAM: "537QQR9WVW"
    CODE_SIGN_STYLE: Automatic

targets:
  Glyph:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Glyph
        excludes:
          - "Info.plist"
          - "Resources"
      # The built editor bundle as a folder reference -> Resources/editor/
      # (produced by `make web`; must exist before generating/building).
      - path: Glyph/Resources/editor
        type: folder
        buildPhase: resources
    dependencies:
      - target: GlyphQuickLookPreview
        embed: true
      - target: GlyphQuickLookThumbnail
        embed: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Glyph/Info.plist
        PRODUCT_NAME: Glyph
        PRODUCT_BUNDLE_IDENTIFIER: com.paolobozzola.glyph
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Glyph/Glyph.entitlements
        COMBINE_HIDPI_IMAGES: YES

  # ---- Quick Look preview extension (spacebar preview) ----
  GlyphQuickLookPreview:
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: QuickLook/Preview
        excludes:
          - "Info.plist"
      - Glyph/AppSchemeHandler.swift           # shared with the app (app:// loader)
      - Glyph/GlyphSettings.swift              # shared settings model (App Group)
      - path: QuickLook/Resources/preview      # preview web bundle (make web)
        type: folder
        buildPhase: resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: QuickLook/Preview/Info.plist
        PRODUCT_NAME: GlyphQuickLookPreview
        PRODUCT_BUNDLE_IDENTIFIER: com.paolobozzola.glyph.QuickLookPreview
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: QuickLook/Glyph-QuickLook.entitlements

  # ---- Quick Look thumbnail extension (Finder thumbnails) ----
  GlyphQuickLookThumbnail:
    type: app-extension
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: QuickLook/Thumbnail
        excludes:
          - "Info.plist"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: QuickLook/Thumbnail/Info.plist
        PRODUCT_NAME: GlyphQuickLookThumbnail
        PRODUCT_BUNDLE_IDENTIFIER: com.paolobozzola.glyph.QuickLookThumbnail
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: QuickLook/Glyph-QuickLook.entitlements

# Explicit shared scheme so `xcodebuild -scheme Glyph` works on a freshly generated
# project — without this, schemes only appear after opening the project in Xcode, so
# `make run` / `make dist` would fail on a clean `xcodegen generate`.
schemes:
  Glyph:
    build:
      targets:
        Glyph: all
    run:
      config: Debug
    archive:
      config: Release
