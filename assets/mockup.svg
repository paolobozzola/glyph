<svg width="1120" height="760" viewBox="0 0 1120 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1120" height="760" fill="#E7E2D6"/>

  <!-- Window -->
  <g filter="url(#shadow)">
    <rect x="60" y="40" width="1000" height="680" rx="14" fill="#F5F1E8"/>
  </g>

  <!-- Title bar -->
  <path d="M60 54 a14 14 0 0 1 14 -14 h972 a14 14 0 0 1 14 14 v34 h-1000 z" fill="#EDE8DC"/>
  <circle cx="86" cy="71" r="6" fill="#FF5F57"/>
  <circle cx="106" cy="71" r="6" fill="#FEBC2E"/>
  <circle cx="126" cy="71" r="6" fill="#28C840"/>
  <text x="560" y="76" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" fill="#6B6678">Welcome.md</text>

  <!-- Document body -->
  <g font-family="-apple-system, Helvetica, Arial, sans-serif" fill="#1A1822">
    <text x="150" y="160" font-size="40" font-weight="700" letter-spacing="-0.5">Welcome to Glyph</text>
    <text x="150" y="206" font-size="18" fill="#3A3646">A pure WYSIWYG Markdown editor for macOS. You see rich text;</text>
    <text x="150" y="232" font-size="18" fill="#3A3646">the file on disk stays clean, portable Markdown.</text>

    <text x="150" y="296" font-size="26" font-weight="650">Features</text>
    <line x1="150" y1="312" x2="810" y2="312" stroke="#E6E3EA" stroke-width="1"/>

    <g font-size="18" fill="#1A1822">
      <circle cx="158" cy="344" r="3" fill="#6B6678"/><text x="176" y="350">Headings, lists, tables, quotes, code — all live</text>
      <circle cx="158" cy="378" r="3" fill="#6B6678"/><text x="176" y="384">Find &amp; replace, outline, focus mode, word count</text>
      <circle cx="158" cy="412" r="3" fill="#6B6678"/><text x="176" y="418">Quick Look preview &amp; Finder thumbnails</text>
    </g>

    <!-- blockquote -->
    <rect x="150" y="446" width="3" height="58" fill="#E6B450"/>
    <text x="172" y="474" font-size="18" font-style="italic" fill="#6B6678">The .md file is the single source of truth —</text>
    <text x="172" y="498" font-size="18" font-style="italic" fill="#6B6678">the editor is just a view over the text.</text>

    <!-- code block -->
    <rect x="150" y="524" width="660" height="86" rx="10" fill="#F0ECF3"/>
    <g font-family="ui-monospace, 'DejaVu Sans Mono', monospace" font-size="15" fill="#1A1822">
      <text x="170" y="552">## Quick start</text>
      <text x="170" y="578" fill="#9A6A00">- type</text><text x="232" y="578">`# ` for a heading, `- ` for a list</text>
    </g>
  </g>

  <!-- Floating selection toolbar (the formatting pop-up) -->
  <g transform="translate(300,244)">
    <rect x="0" y="0" width="356" height="46" rx="12" fill="#1A1822"/>
    <g font-family="-apple-system, Helvetica, Arial, sans-serif" fill="#F5F1E8">
      <text x="26" y="30" font-size="18" font-weight="800">B</text>
      <text x="64" y="30" font-size="18" font-style="italic" font-weight="600">I</text>
      <text x="98" y="30" font-size="17" text-decoration="line-through">S</text>
      <text x="128" y="30" font-size="14" font-family="monospace">&lt;/&gt;</text>
      <text x="170" y="30" font-size="16">🔗</text>
      <line x1="208" y1="12" x2="208" y2="34" stroke="#403B4E" stroke-width="1"/>
      <text x="236" y="30" font-size="15" font-weight="700" fill="#E6B450">H1</text>
      <text x="276" y="30" font-size="15" font-weight="700">H2</text>
      <text x="316" y="30" font-size="15" font-weight="700">H3</text>
    </g>
  </g>

  <!-- Status bar -->
  <path d="M60 684 h1000 v22 a14 14 0 0 1 -14 14 h-972 a14 14 0 0 1 -14 -14 z" fill="#EDE8DC"/>
  <text x="78" y="708" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#6B6678">182 words · 1,032 characters · 1 min read</text>
  <g font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#6B6678">
    <text x="846" y="708">Markdown</text>
    <text x="942" y="708">Outline</text>
    <text x="1014" y="708" fill="#9A6A00" font-weight="600">Focus</text>
  </g>
</svg>
